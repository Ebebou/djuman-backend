<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="shortcut icon" href="/frontend/favicon-32x32.png" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <title>Djuman - Connexion Administration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background-color: #2B323E;
            color: #2B323E;
            font-family: 'Galano Grotesque', sans-serif;

        }


        .login-container {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2B323E;
            padding: 20px;
        }

        .login-card {
            background: #fafafa;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header img {
            height: 50px;
            margin-bottom: 15px;
        }


        .error-message {
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #595959;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #595959;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 20px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #629A72;
            /* Couleur d'accentuation moderne */
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15);
        }

        .btn-login {
            width: 100%;
            background-color: #2B323E;
            color: #fafafa;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-login:hover {
            background-color: #1a2333;
        }
    </style>
</head>

<body>

    <!-- RESTRICTION MOBILE -->
    <div class="mobile-restriction">
        <i data-lucide="monitor" style="width:48px;height:48px;color:#629A72;"></i>
        <h2>Accès Desktop uniquement</h2>
        <p>L'administration Djuman est réservée aux écrans de bureau.</p>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="/frontend/assets/image/logo_rectangle_bleu.svg" alt="Djuman Logo">
                <h1>Espace Admin</h1>
            </div>

            <div id="errorMessage" class="error-message">
                <i data-lucide="alert-circle" style="width:18px;height:18px;"></i>
                <span id="errorText">Identifiants incorrects.</span>
            </div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="admin@djuman.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <span>Se connecter</span>
                    <i data-lucide="arrow-right" style="width:18px;height:18px;"></i>
                </button>
            </form>
        </div>
    </div>

    <style>

    </style>

    <!-- ✅ Lucide chargé EN PREMIER -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>

    <!-- ✅ Bon nom de fichier : auth.js et non admin-login.js -->
    <script src="js/auth.js"></script>

</body>


</html>
